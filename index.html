<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISTE Meetings CRM</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237F77DD'/><text x='16' y='22' text-anchor='middle' font-size='16' font-family='sans-serif' fill='white' font-weight='600'>I</text></svg>" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- React 18 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel standalone (transpiles JSX in the browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (compat / UMD) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
      // Initialize Firebase (compat SDK — globals available as firebase.auth(), firebase.firestore())
      const firebaseConfig = {
        apiKey: "AIzaSyBm9nF7p5VIvNJoVSdKsNZar4CDWMmI8T8",
        authDomain: "iste-meetings-contentsales.firebaseapp.com",
        projectId: "iste-meetings-contentsales",
        storageBucket: "iste-meetings-contentsales.firebasestorage.app",
        messagingSenderId: "180735672280",
        appId: "1:180735672290:web:0277082b7284ce154a43bb"
      };
      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();
    </script>

    <script type="text/babel">
      const { useState, useEffect } = React;

      /* ── constants ── */
      const USERS = {
        jutech:       { email: "jutech@iste-meetings.com",       name: "Jordan Utech" },
        ddepasquale:  { email: "ddepasquale@iste-meetings.com",  name: "David DePasquale" },
      };

      const STAGES = [
        { id: "lead",        label: "Lead",        color: "#888780" },
        { id: "qualified",   label: "Qualified",   color: "#378ADD" },
        { id: "proposal",    label: "Proposal",    color: "#BA7517" },
        { id: "negotiation", label: "Negotiation", color: "#7F77DD" },
        { id: "closed_won",  label: "Closed Won",  color: "#639922" },
        { id: "closed_lost", label: "Closed Lost", color: "#E24B4A" },
      ];
      const STAGE_MAP = Object.fromEntries(STAGES.map(s => [s.id, s]));

      const fmt = n => new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(n || 0);
      const initials = name => (name || "?").split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);

      /* ── CSS ── */
      const css = `
        .app { display:flex; flex-direction:column; min-height:100vh; }

        /* auth */
        .auth-wrap { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#f5f5f3; }
        .auth-card { background:#fff; border:0.5px solid rgba(0,0,0,0.12); border-radius:16px; padding:2.5rem; width:380px; max-width:90vw; }
        .auth-logo { font-size:20px; font-weight:600; margin-bottom:0.25rem; letter-spacing:-0.3px; }
        .auth-sub  { font-size:13px; color:#888; margin-bottom:2rem; }

        /* form elements */
        .field { margin-bottom:1.25rem; }
        .field label { display:block; font-size:11px; font-weight:600; color:#888; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
        .field input, .field select, .field textarea {
          width:100%; border:0.5px solid rgba(0,0,0,0.2); border-radius:8px;
          padding:0 12px; font-size:14px; background:#fff; color:#1a1a18;
          outline:none; font-family:inherit; transition:border-color 0.15s; height:40px;
        }
        .field textarea { height:auto; padding:10px 12px; resize:vertical; min-height:80px; }
        .field input:focus, .field select:focus, .field textarea:focus { border-color:#7F77DD; }

        /* buttons */
        .btn { height:40px; padding:0 18px; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; border:0.5px solid rgba(0,0,0,0.15); background:#1a1a18; color:#fff; transition:opacity 0.15s; font-family:inherit; }
        .btn:hover { opacity:0.85; }
        .btn:disabled { opacity:0.5; cursor:not-allowed; }
        .btn-outline  { background:#fff; color:#1a1a18; }
        .btn-primary  { background:#7F77DD; border-color:#7F77DD; color:#fff; }
        .btn-danger   { background:#E24B4A; border-color:#E24B4A; color:#fff; }
        .btn-sm       { height:32px; padding:0 12px; font-size:13px; }
        .err { color:#E24B4A; font-size:13px; margin-top:6px; }

        /* nav */
        .nav { background:#fff; border-bottom:0.5px solid rgba(0,0,0,0.1); padding:0 2rem; display:flex; align-items:center; gap:1.5rem; height:56px; position:sticky; top:0; z-index:100; }
        .nav-brand { font-size:15px; font-weight:600; letter-spacing:-0.2px; margin-right:0.5rem; }
        .nav-link  { font-size:14px; color:#aaa; cursor:pointer; padding:4px 0; border-bottom:2px solid transparent; transition:color 0.15s; }
        .nav-link.active { color:#1a1a18; border-bottom-color:#7F77DD; }
        .nav-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
        .avatar { width:32px; height:32px; border-radius:50%; background:#EEEDFE; color:#534AB7; font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center; }

        /* main */
        .main { padding:2rem; flex:1; max-width:1200px; width:100%; margin:0 auto; }

        /* metrics */
        .metrics { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px; margin-bottom:2rem; }
        .metric { background:#fff; border:0.5px solid rgba(0,0,0,0.1); border-radius:12px; padding:1rem 1.25rem; }
        .metric-label { font-size:12px; color:#888; margin-bottom:6px; font-weight:500; }
        .metric-val   { font-size:22px; font-weight:600; letter-spacing:-0.5px; }

        /* pipeline */
        .pipeline { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; margin-bottom:2rem; overflow-x:auto; }
        .pipeline-col { min-width:140px; }
        .pipeline-head { font-size:11px; font-weight:600; padding:7px 10px; border-radius:8px 8px 0 0; border:0.5px solid rgba(0,0,0,0.1); border-bottom:none; display:flex; justify-content:space-between; align-items:center; }
        .pipeline-body { border:0.5px solid rgba(0,0,0,0.1); border-top:none; border-radius:0 0 8px 8px; min-height:80px; padding:8px; background:#fafaf8; display:flex; flex-direction:column; gap:6px; }
        .deal-chip { background:#fff; border:0.5px solid rgba(0,0,0,0.1); border-radius:8px; padding:8px; cursor:pointer; font-size:12px; transition:box-shadow 0.15s; }
        .deal-chip:hover { box-shadow:0 2px 8px rgba(0,0,0,0.08); }
        .deal-chip-name { font-weight:500; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .deal-chip-co   { font-size:11px; color:#aaa; margin-bottom:3px; }
        .deal-chip-val  { color:#7F77DD; font-weight:600; }

        /* section */
        .section-head  { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
        .section-title { font-size:18px; font-weight:600; letter-spacing:-0.3px; }

        /* table */
        .table-wrap { background:#fff; border:0.5px solid rgba(0,0,0,0.1); border-radius:12px; overflow:hidden; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th { text-align:left; padding:10px 14px; font-size:11px; font-weight:600; color:#888; text-transform:uppercase; letter-spacing:0.4px; background:#fafaf8; border-bottom:0.5px solid rgba(0,0,0,0.08); }
        td { padding:10px 14px; border-bottom:0.5px solid rgba(0,0,0,0.06); vertical-align:middle; }
        tr:last-child td { border-bottom:none; }
        tr.clickable:hover td { background:#fafaf8; cursor:pointer; }
        .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
        .row-actions { display:flex; gap:6px; opacity:0; }
        tr:hover .row-actions { opacity:1; }

        /* modal */
        .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:200; padding:1rem; }
        .modal { background:#fff; border-radius:16px; padding:2rem; width:600px; max-width:100%; max-height:90vh; overflow-y:auto; }
        .modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; }
        .modal-title { font-size:18px; font-weight:600; letter-spacing:-0.3px; }
        .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
        .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:1.5rem; padding-top:1rem; border-top:0.5px solid rgba(0,0,0,0.08); }

        /* detail */
        .detail-avatar { width:52px; height:52px; border-radius:50%; background:#EEEDFE; color:#534AB7; font-size:16px; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem 2rem; margin-bottom:1.25rem; }
        .info-row label { font-size:11px; color:#aaa; font-weight:600; text-transform:uppercase; letter-spacing:0.4px; display:block; margin-bottom:2px; }
        .info-row span  { font-size:14px; color:#1a1a18; }

        /* tasks */
        .task-list { display:flex; flex-direction:column; gap:6px; margin:0.5rem 0; }
        .task-item { display:flex; align-items:center; gap:10px; padding:8px; background:#fafaf8; border-radius:8px; border:0.5px solid rgba(0,0,0,0.08); font-size:13px; }
        .task-item input[type=checkbox] { cursor:pointer; }
        .task-item.done span { text-decoration:line-through; color:#aaa; }
        .task-add { display:flex; gap:8px; margin-top:8px; }
        .task-add input { flex:1; height:36px; border:0.5px solid rgba(0,0,0,0.2); border-radius:8px; padding:0 12px; font-size:13px; outline:none; font-family:inherit; }
        .task-add input:focus { border-color:#7F77DD; }

        @media(max-width:700px) {
          .grid2, .info-grid { grid-template-columns:1fr; }
          .pipeline { grid-template-columns:repeat(3,minmax(140px,1fr)); }
          .main { padding:1rem; }
          .nav  { padding:0 1rem; }
        }
      `;

      /* ══════════════════════════════════════════════
         Root App
      ══════════════════════════════════════════════ */
      function App() {
        const [user,      setUser]      = useState(null);
        const [loading,   setLoading]   = useState(true);
        const [view,      setView]      = useState("pipeline");
        const [deals,     setDeals]     = useState([]);
        const [modal,     setModal]     = useState(null);
        const [detail,    setDetail]    = useState(null);
        const [loginForm, setLoginForm] = useState({ user: "jutech", password: "" });
        const [authErr,   setAuthErr]   = useState("");

        /* auth listener */
        useEffect(() => {
          const unsub = auth.onAuthStateChanged(u => { setUser(u); setLoading(false); });
          return unsub;
        }, []);

        /* realtime deals */
        useEffect(() => {
          if (!user) return;
          const unsub = db.collection("deals")
            .orderBy("createdAt", "desc")
            .onSnapshot(snap => setDeals(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
          return unsub;
        }, [user]);

        const login = async () => {
          setAuthErr("");
          const cfg = USERS[loginForm.user];
          if (!cfg) return setAuthErr("Unknown user.");
          try {
            await auth.signInWithEmailAndPassword(cfg.email, loginForm.password);
          } catch {
            setAuthErr("Invalid credentials. Check your password.");
          }
        };

        const saveDeal = async data => {
          const payload = { ...data, value: Number(data.value) || 0, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
          if (data.id) {
            const { id, ...rest } = payload;
            await db.collection("deals").doc(data.id).update(rest);
          } else {
            await db.collection("deals").add({ ...payload, tasks: [], createdAt: firebase.firestore.FieldValue.serverTimestamp() });
          }
        };

        const deleteDeal = async id => {
          if (!window.confirm("Delete this deal?")) return;
          await db.collection("deals").doc(id).delete();
          setDetail(null);
        };

        const updateTasks = async (dealId, tasks) => {
          await db.collection("deals").doc(dealId).update({ tasks });
          setDetail(d => d ? { ...d, tasks } : d);
        };

        if (loading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",color:"#888",fontSize:14}}>Loading…</div>;

        if (!user) return (
          <>
            <style>{css}</style>
            <LoginScreen form={loginForm} setForm={setLoginForm} onLogin={login} error={authErr} />
          </>
        );

        const userName = Object.values(USERS).find(u => u.email === user.email)?.name || "User";
        const won    = deals.filter(d => d.stage === "closed_won");
        const active = deals.filter(d => !["closed_won","closed_lost"].includes(d.stage));
        const pipe   = active.reduce((s, d) => s + (d.value || 0), 0);
        const rev    = won.reduce((s, d) => s + (d.value || 0), 0);

        return (
          <>
            <style>{css}</style>
            <div className="app">
              <nav className="nav">
                <span className="nav-brand">ISTE Meetings</span>
                <span className={`nav-link ${view==="pipeline"?"active":""}`} onClick={() => setView("pipeline")}>Pipeline</span>
                <span className={`nav-link ${view==="deals"?"active":""}`}    onClick={() => setView("deals")}>All deals</span>
                <div className="nav-right">
                  <div className="avatar" title={userName}>{initials(userName)}</div>
                  <button className="btn btn-outline btn-sm" onClick={() => auth.signOut()}>Sign out</button>
                </div>
              </nav>

              <div className="main">
                {/* Metrics row */}
                <div className="metrics">
                  <div className="metric"><div className="metric-label">Total deals</div><div className="metric-val">{deals.length}</div></div>
                  <div className="metric"><div className="metric-label">Active pipeline</div><div className="metric-val" style={{color:"#7F77DD"}}>{fmt(pipe)}</div></div>
                  <div className="metric"><div className="metric-label">Revenue closed</div><div className="metric-val" style={{color:"#639922"}}>{fmt(rev)}</div></div>
                  <div className="metric"><div className="metric-label">Deals won</div><div className="metric-val">{won.length}</div></div>
                </div>

                {view === "pipeline"
                  ? <PipelineView deals={deals} onAdd={() => setModal("new")} onOpen={setDetail} />
                  : <DealsTable   deals={deals} onAdd={() => setModal("new")} onOpen={setDetail} onDelete={deleteDeal} />
                }
              </div>
            </div>

            {(modal === "new" || (modal && modal.id)) && (
              <DealModal deal={modal !== "new" ? modal : null} onSave={async d => { await saveDeal(d); setModal(null); }} onClose={() => setModal(null)} />
            )}

            {detail && (
              <DetailModal deal={detail} onClose={() => setDetail(null)} onEdit={() => { setModal(detail); setDetail(null); }} onDelete={() => deleteDeal(detail.id)} onUpdateTasks={tasks => updateTasks(detail.id, tasks)} />
            )}
          </>
        );
      }

      /* ══ Login ══ */
      function LoginScreen({ form, setForm, onLogin, error }) {
        return (
          <div className="auth-wrap">
            <div className="auth-card">
              <div className="auth-logo">ISTE Meetings CRM</div>
              <div className="auth-sub">Content sales pipeline</div>
              <div className="field">
                <label>Account</label>
                <select value={form.user} onChange={e => setForm(f => ({...f, user: e.target.value}))}>
                  <option value="jutech">Jordan Utech</option>
                  <option value="ddepasquale">David DePasquale</option>
                </select>
              </div>
              <div className="field">
                <label>Password</label>
                <input type="password" value={form.password} onChange={e => setForm(f => ({...f, password: e.target.value}))} onKeyDown={e => e.key==="Enter" && onLogin()} />
                {error && <div className="err">{error}</div>}
              </div>
              <button className="btn" style={{width:"100%"}} onClick={onLogin}>Sign in</button>
            </div>
          </div>
        );
      }

      /* ══ Pipeline view ══ */
      function PipelineView({ deals, onAdd, onOpen }) {
        return (
          <>
            <div className="section-head">
              <div className="section-title">Pipeline</div>
              <button className="btn btn-primary btn-sm" onClick={onAdd}>+ New deal</button>
            </div>
            <div className="pipeline">
              {STAGES.map(stage => {
                const cols  = deals.filter(d => d.stage === stage.id);
                const total = cols.reduce((s, d) => s + (d.value || 0), 0);
                return (
                  <div key={stage.id} className="pipeline-col">
                    <div className="pipeline-head" style={{background: stage.color+"18", borderColor: stage.color+"40"}}>
                      <span style={{color: stage.color}}>{stage.label}</span>
                      <span style={{color: stage.color}}>{cols.length}</span>
                    </div>
                    <div className="pipeline-body">
                      {total > 0 && <div style={{fontSize:11, color:"#aaa", paddingBottom:2}}>{fmt(total)}</div>}
                      {cols.map(d => (
                        <div key={d.id} className="deal-chip" onClick={() => onOpen(d)}>
                          <div className="deal-chip-name">{d.contact || d.company || "—"}</div>
                          {d.company && d.contact && <div className="deal-chip-co">{d.company}</div>}
                          {d.value > 0 && <div className="deal-chip-val">{fmt(d.value)}</div>}
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </>
        );
      }

      /* ══ Deals table ══ */
      function DealsTable({ deals, onAdd, onOpen, onDelete }) {
        return (
          <>
            <div className="section-head">
              <div className="section-title">All deals</div>
              <button className="btn btn-primary btn-sm" onClick={onAdd}>+ New deal</button>
            </div>
            <div className="table-wrap">
              <table>
                <thead>
                  <tr><th>Contact</th><th>Company</th><th>Stage</th><th>Value</th><th>Close date</th><th>Owner</th><th></th></tr>
                </thead>
                <tbody>
                  {deals.length === 0 && (
                    <tr><td colSpan={7} style={{color:"#aaa", textAlign:"center", padding:"2.5rem"}}>No deals yet — add your first one</td></tr>
                  )}
                  {deals.map(d => {
                    const stage = STAGE_MAP[d.stage] || STAGE_MAP.lead;
                    return (
                      <tr key={d.id} className="clickable" onClick={() => onOpen(d)}>
                        <td style={{fontWeight:500}}>{d.contact || "—"}</td>
                        <td style={{color:"#888"}}>{d.company || "—"}</td>
                        <td><span className="badge" style={{background: stage.color+"18", color: stage.color}}>{stage.label}</span></td>
                        <td style={{color:"#7F77DD", fontWeight:600}}>{d.value ? fmt(d.value) : "—"}</td>
                        <td style={{color:"#888"}}>{d.closeDate || "—"}</td>
                        <td style={{color:"#888"}}>{d.owner || "—"}</td>
                        <td>
                          <div className="row-actions">
                            <button className="btn btn-outline btn-sm" onClick={e => { e.stopPropagation(); onOpen(d); }}>View</button>
                            <button className="btn btn-danger btn-sm"  onClick={e => { e.stopPropagation(); onDelete(d.id); }}>Delete</button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </>
        );
      }

      /* ══ Deal modal (new / edit) ══ */
      function DealModal({ deal, onSave, onClose }) {
        const [form, setForm] = useState(deal || { contact:"", company:"", email:"", phone:"", stage:"lead", value:"", closeDate:"", owner:"", notes:"" });
        const [saving, setSaving] = useState(false);
        const set = k => e => setForm(f => ({...f, [k]: e.target.value}));

        const save = async () => {
          setSaving(true);
          try { await onSave(form); } finally { setSaving(false); }
        };

        return (
          <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
            <div className="modal">
              <div className="modal-head">
                <div className="modal-title">{deal ? "Edit deal" : "New deal"}</div>
                <button className="btn btn-outline btn-sm" onClick={onClose}>Cancel</button>
              </div>
              <div className="grid2">
                <div className="field"><label>Contact name</label><input value={form.contact}   onChange={set("contact")}   placeholder="Jane Smith" /></div>
                <div className="field"><label>Company</label>      <input value={form.company}   onChange={set("company")}   placeholder="Acme Corp" /></div>
                <div className="field"><label>Email</label>        <input type="email" value={form.email} onChange={set("email")} placeholder="jane@acme.com" /></div>
                <div className="field"><label>Phone</label>        <input value={form.phone}     onChange={set("phone")}     placeholder="+1 (555) 000-0000" /></div>
                <div className="field">
                  <label>Stage</label>
                  <select value={form.stage} onChange={set("stage")}>
                    {STAGES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                  </select>
                </div>
                <div className="field"><label>Deal value ($)</label><input type="number" value={form.value} onChange={set("value")} placeholder="0" /></div>
                <div className="field"><label>Expected close</label><input type="date" value={form.closeDate} onChange={set("closeDate")} /></div>
                <div className="field">
                  <label>Owner</label>
                  <select value={form.owner} onChange={set("owner")}>
                    <option value="">— assign —</option>
                    <option value="Jordan Utech">Jordan Utech</option>
                    <option value="David DePasquale">David DePasquale</option>
                  </select>
                </div>
              </div>
              <div className="field"><label>Notes</label><textarea value={form.notes} onChange={set("notes")} placeholder="Context, requirements, next steps…" /></div>
              <div className="modal-actions">
                <button className="btn btn-primary" onClick={save} disabled={saving}>
                  {saving ? "Saving…" : deal ? "Save changes" : "Create deal"}
                </button>
              </div>
            </div>
          </div>
        );
      }

      /* ══ Detail modal ══ */
      function DetailModal({ deal, onClose, onEdit, onDelete, onUpdateTasks }) {
        const [newTask, setNewTask] = useState("");
        const tasks = deal.tasks || [];
        const stage = STAGE_MAP[deal.stage] || STAGE_MAP.lead;

        const addTask = () => {
          if (!newTask.trim()) return;
          onUpdateTasks([...tasks, { text: newTask.trim(), done: false }]);
          setNewTask("");
        };

        return (
          <div className="overlay" onClick={e => e.target === e.currentTarget && onClose()}>
            <div className="modal">
              {/* header */}
              <div className="modal-head">
                <div style={{display:"flex", alignItems:"center", gap:"1rem"}}>
                  <div className="detail-avatar">{initials(deal.contact || deal.company || "?")}</div>
                  <div>
                    <div style={{fontWeight:600, fontSize:17, letterSpacing:"-0.3px"}}>{deal.contact || "—"}</div>
                    <div style={{fontSize:13, color:"#888", marginTop:2}}>{deal.company || ""}</div>
                  </div>
                </div>
                <div style={{display:"flex", gap:8}}>
                  <button className="btn btn-outline btn-sm" onClick={onEdit}>Edit</button>
                  <button className="btn btn-outline btn-sm" onClick={onClose}>✕</button>
                </div>
              </div>

              {/* stage + value */}
              <div style={{margin:"0.25rem 0 1.25rem", display:"flex", alignItems:"center", gap:10}}>
                <span className="badge" style={{background: stage.color+"18", color: stage.color, fontSize:12}}>{stage.label}</span>
                {deal.value > 0 && <span style={{fontWeight:600, color:"#7F77DD"}}>{fmt(deal.value)}</span>}
                {deal.closeDate && <span style={{fontSize:13, color:"#aaa"}}>Close {deal.closeDate}</span>}
              </div>

              {/* info grid */}
              <div className="info-grid">
                {[["Email",deal.email],["Phone",deal.phone],["Owner",deal.owner]].map(([label,val]) =>
                  val ? <div key={label} className="info-row"><label>{label}</label><span>{val}</span></div> : null
                )}
              </div>

              {/* notes */}
              {deal.notes && (
                <div style={{marginBottom:"1.25rem", padding:"0.75rem 1rem", background:"#fafaf8", borderRadius:10, fontSize:13, color:"#555", lineHeight:1.6}}>
                  {deal.notes}
                </div>
              )}

              {/* tasks */}
              <div style={{borderTop:"0.5px solid rgba(0,0,0,0.08)", paddingTop:"1rem"}}>
                <div style={{fontSize:13, fontWeight:600, marginBottom:"0.5rem"}}>
                  Tasks {tasks.length > 0 && `(${tasks.filter(t=>t.done).length}/${tasks.length} done)`}
                </div>
                <div className="task-list">
                  {tasks.map((t, i) => (
                    <div key={i} className={`task-item ${t.done?"done":""}`}>
                      <input type="checkbox" checked={t.done} onChange={() => onUpdateTasks(tasks.map((x,j) => j===i ? {...x,done:!x.done} : x))} />
                      <span style={{flex:1}}>{t.text}</span>
                      <button style={{background:"none", border:"none", cursor:"pointer", color:"#ccc", fontSize:18, lineHeight:1}} onClick={() => onUpdateTasks(tasks.filter((_,j) => j!==i))}>×</button>
                    </div>
                  ))}
                </div>
                <div className="task-add">
                  <input value={newTask} onChange={e => setNewTask(e.target.value)} placeholder="Add a task…" onKeyDown={e => e.key==="Enter" && addTask()} />
                  <button className="btn btn-outline btn-sm" onClick={addTask}>Add</button>
                </div>
              </div>

              <div className="modal-actions">
                <button className="btn btn-danger btn-sm" onClick={onDelete}>Delete deal</button>
              </div>
            </div>
          </div>
        );
      }

      /* ══ Mount ══ */
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
